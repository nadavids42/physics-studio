<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Projectile launch velocity components</title>
  <desc id="desc">A launch velocity points up and right and is resolved into horizontal and vertical components. Gravity points downward.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1565c0"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#c62828"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#37474f"/></marker>
  </defs>
  <rect width="720" height="360" rx="18" fill="#f7fafc"/>
  <line x1="110" y1="285" x2="650" y2="285" stroke="#37474f" stroke-width="3" marker-end="url(#arrow-gray)"/>
  <line x1="110" y1="285" x2="110" y2="45" stroke="#37474f" stroke-width="3" marker-end="url(#arrow-gray)"/>
  <text x="660" y="294" font-family="sans-serif" font-size="22" fill="#263238">+x</text>
  <text x="82" y="38" font-family="sans-serif" font-size="22" fill="#263238">+y</text>
  <path d="M110 285 Q280 80 560 285" fill="none" stroke="#7e57c2" stroke-width="4" stroke-dasharray="9 7"/>
  <line x1="110" y1="285" x2="330" y2="105" stroke="#1565c0" stroke-width="7" marker-end="url(#arrow-blue)"/>
  <line x1="110" y1="285" x2="330" y2="285" stroke="#1565c0" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <line x1="110" y1="285" x2="110" y2="105" stroke="#1565c0" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <line x1="520" y1="90" x2="520" y2="190" stroke="#c62828" stroke-width="6" marker-end="url(#arrow-red)"/>
  <text x="245" y="92" font-family="sans-serif" font-size="24" fill="#0d47a1">v₀</text>
  <text x="205" y="320" font-family="sans-serif" font-size="22" fill="#0d47a1">vₓ = v₀ cos θ</text>
  <text x="25" y="185" font-family="sans-serif" font-size="22" fill="#0d47a1">vᵧ = v₀ sin θ</text>
  <text x="540" y="145" font-family="sans-serif" font-size="22" fill="#b71c1c">g</text>
  <circle cx="110" cy="285" r="9" fill="#263238"/>
</svg>
